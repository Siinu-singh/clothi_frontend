<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Clothi - Login</title>

                "primary": "#9b4329",
                "on-primary-container": "#ffffff",
                "on-background": "#1b1c1a",
                "primary-fixed-dim": "#ffb5a0",
                "on-surface-variant": "#55423d",
                "outline": "#89726c",
                "error": "#ba1a1a",
                "surface-tint": "#9b442a",
                "on-tertiary": "#ffffff",
                "on-tertiary-fixed": "#191c1d",
                "on-tertiary-container": "#ffffff",
                "inverse-on-surface": "#f2f0ed",
                "background": "#fbf9f5",
                "secondary-fixed": "#ffdcc2",
                "on-tertiary-fixed-variant": "#444748",
                "secondary-container": "#fcd9bf",

                "inverse-primary": "#ffb5a0",

              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .coastal-gradient {
            background: linear-gradient(135deg, #fbf9f5 0%, #efeeea 50%, #e4e2de 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- Suppressing Shared Nav Shells per Rules for Transactional Login Page -->
<main class="min-h-screen coastal-gradient flex items-center justify-center p-6 relative overflow-hidden">
<!-- Artistic Background Blobs for Coastal Feel -->
<div class="absolute top-[-10%] right-[-10%] w-[40rem] h-[40rem] bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[30rem] h-[30rem] bg-secondary-container/20 rounded-full blur-[80px]"></div>
<div class="w-full max-w-md relative z-10">
<!-- Glassmorphism Container -->
<div class="glass-card rounded-xl p-8 md:p-12 shadow-[0_32px_64px_-12px_rgba(27,28,26,0.05)]">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-10">
<img alt="Clothi Logo" class="h-12 mb-6" data-alt="Minimalist elegant serif logo for Clothi brand" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAb8Q5ASl-7Ee38Nl2GC_rhO5QROLITRiLFxNYLqxtrUgcn-OkXPYntKo9UhClToNhwrLge7LxD-TXymV5NgpJvVS4imQHXI3dQgdBD2IcNTc_1DJxFeyFX1zp6EAfnFdEYr8dSsNxzct9epWZF7XihAva_GSfOLVF2epCmbFrcJ-nBISnbvr4NwAOfMOHvBtjmaw2x-S703jkrEZE6TSaDnIf2AMF5jxOLz1OH81nv1Y_aRVWqX52WFj0zrt69PUZeg9Dvqv_fBnw"/>
<h1 class="font-headline italic text-4xl text-on-surface tracking-tight">Welcome back</h1>
<p class="font-body text-on-surface-variant text-sm mt-2">Log in to your coastal atelier account</p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-lowest hover:bg-surface-bright py-3.5 rounded-lg transition-all duration-300 group" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-label text-sm font-medium tracking-wide">Continue with Google</span>
</button>
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-xs font-label text-on-surface-variant/60 uppercase tracking-widest">or email</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Email Input -->
<div class="group">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant mb-1.5" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/40 focus:ring-0 focus:border-primary px-0 py-2.5 transition-all text-on-surface placeholder:text-outline/40" id="email" name="email" placeholder="atelier@clothi.com" type="email"/>
</div>
<!-- Password Input -->
<div class="group">
<label class="block text-xs font-label uppercase tracking-widest text-on-surface-variant mb-1.5" for="password">Password</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/40 focus:ring-0 focus:border-primary px-0 py-2.5 transition-all text-on-surface placeholder:text-outline/40" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<div class="flex items-center justify-between pt-2">
<label class="flex items-center gap-2 cursor-pointer">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary/20" type="checkbox"/>
<span class="text-xs font-body text-on-surface-variant">Remember me</span>
</label>
<a class="text-xs font-headline italic text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<!-- Primary CTA -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary py-4 rounded-lg font-label text-sm font-semibold tracking-widest uppercase shadow-lg shadow-primary/10 hover:shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all" type="submit">
                        Log In
                    </button>
</form>
<!-- Toggle -->
<div class="mt-10 text-center">
<p class="text-sm font-body text-on-surface-variant">
                        New to Clothi? 
                        <a class="text-primary font-headline italic ml-1 hover:underline underline-offset-4" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Contextual Footer (Minimal) -->
<footer class="mt-12 text-center">
<p class="text-[10px] font-label uppercase tracking-[0.2em] text-on-surface-variant/50 leading-loose">
                    © 2024 Clothi Atelier.<br/>Inspired by the coast, tailored for the journey.
                </p>
<div class="flex justify-center gap-6 mt-4">
<a class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant/40 hover:text-primary transition-colors" href="#">Privacy</a>
<a class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant/40 hover:text-primary transition-colors" href="#">Terms</a>
<a class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant/40 hover:text-primary transition-colors" href="#">Support</a>
</div>
</footer>
</div>
</main>
<!-- Floating Branding Elements for Aesthetic Balance -->
<div class="fixed bottom-12 right-12 pointer-events-none hidden lg:block opacity-20">
<span class="font-headline italic text-8xl text-outline-variant select-none">Atelier</span>
</div>
</body></html>
